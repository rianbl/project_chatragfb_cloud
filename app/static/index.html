<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <h1>Data Review</h1>
        <a href="https://www.youtube.com/@datarvw" target="_blank">YouTube</a>
        <a href="https://github.com/rianbl" target="_blank">Github</a>
    </header>
    
    <div class="chat-upload-wrapper">
        <div class="workspace-row">
            <div id="filesPanel" class="files-panel is-collapsed">
                <div id="contextCollapsedRail" class="context-collapsed-rail" title="Expand context panel">
                    <span id="contextStatusIcon" class="context-rail-icon">📂</span>
                    <span id="contextDocsCount" class="context-rail-count">0</span>
                    <span class="context-rail-menu">☰</span>
                </div>
                <div class="context-open-content">
                    <div class="files-header">
                        <span id="filesCounter">Context (0/3)</span>
                        <button id="contextToggleButton" class="context-toggle-button" type="button" aria-expanded="false" title="Expand context panel">▶</button>
                    </div>
                    <div id="documentsList" class="documents-list"></div>
                </div>
            </div>
            <div class="chat-column">
                <div class="chat-container">
                    <div class="chat-display" id="chatDisplay"></div>
                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="Ask me about your data...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
                <div id="uploadContainer" class="upload-container">
                    <div id="dropZone" class="drop-zone" ondrop="handleDrop(event)" ondragover="allowDrag(event)">
                        Drag & Drop your file here (CSV, TXT, PDF)
                    </div>
                    <input type="file" id="fileInput" onchange="uploadFile()" accept=".csv,.txt,.pdf" hidden>
                    <button onclick="document.getElementById('fileInput').click()">Browse</button>
                </div>
            </div>
            <div id="memoryPanel" class="memory-panel is-collapsed">
                <div id="memoryCollapsedRail" class="memory-collapsed-rail" title="Expand memory graph panel">
                    <span id="memoryStatusIcon" class="memory-rail-icon">🧠</span>
                    <span id="memoryNodesCount" class="memory-rail-count">0</span>
                    <span class="memory-rail-menu">☰</span>
                </div>
                <div class="memory-open-content">
                    <div class="memory-header">
                        <span id="memoryCounter">Memory Graph</span>
                        <button id="memoryToggleButton" class="memory-toggle-button" type="button" aria-expanded="false" title="Expand memory graph panel">◀</button>
                    </div>
                    <div id="memoryGraphCanvas" class="memory-graph-canvas"></div>
                    <div id="memoryGraphLegend" class="memory-graph-legend"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Uploading file, please wait...</p>
    </div>
    
    <script src="script.js?v=20260605-2"></script>
</body>
</html>

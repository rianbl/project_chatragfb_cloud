<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR - Knowledge Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css">
</head>
<body>
    <header class="site-header">
        <h1>Data Review</h1>
        <div class="site-header-links">
            <a href="https://www.youtube.com/@datarvw" target="_blank" rel="noopener noreferrer" aria-label="YouTube" title="YouTube">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M23.5 6.2a3.1 3.1 0 0 0-2.2-2.2C19.4 3.5 12 3.5 12 3.5s-7.4 0-9.3.5A3.1 3.1 0 0 0 .5 6.2 33.3 33.3 0 0 0 0 12a33.3 33.3 0 0 0 .5 5.8 3.1 3.1 0 0 0 2.2 2.2c1.9.5 9.3.5 9.3.5s7.4 0 9.3-.5a3.1 3.1 0 0 0 2.2-2.2A33.3 33.3 0 0 0 24 12a33.3 33.3 0 0 0-.5-5.8ZM9.6 15.5v-7l6.1 3.5-6.1 3.5Z"/>
                </svg>
            </a>
            <a href="https://github.com/rianbl" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.2c-3.4.8-4.2-1.4-4.2-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.6-1.4-5.6-6 0-1.3.5-2.4 1.2-3.3-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.2 11.2 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8.1 3.1.8.9 1.2 2 1.2 3.3 0 4.7-2.9 5.7-5.6 6 .4.4.9 1.1.9 2.3v3.4c0 .4.2.7.8.6A12 12 0 0 0 12 .5Z"/>
                </svg>
            </a>
        </div>
    </header>
    
    <div class="chat-upload-wrapper">
        <div class="workspace-row">
            <div id="filesPanel" class="files-panel is-collapsed">
                <div id="contextCollapsedRail" class="context-collapsed-rail" title="Expand context panel">
                    <span id="contextStatusIcon" class="context-rail-icon">📂</span>
                    <span id="contextDocsCount" class="context-rail-count">0</span>
                    <span class="context-rail-menu">☰</span>
                </div>
                <div class="context-open-content">
                    <div class="files-header">
                        <span id="filesCounter">Context (0/3)</span>
                        <button id="contextToggleButton" class="context-toggle-button" type="button" aria-expanded="false" title="Expand context panel">▶</button>
                    </div>
                    <div id="documentsList" class="documents-list"></div>
                </div>
            </div>
            <div class="chat-column">
                <div id="chatCollapsedRail" class="chat-collapsed-rail" title="Expand chat panel">
                    <span class="chat-rail-icon">💬</span>
                </div>
                <div class="chat-open-content">
                    <div class="chat-container">
                        <div class="chat-display" id="chatDisplay"></div>
                        <div class="chat-input">
                            <input type="text" id="userInput" placeholder="Ask me about your data...">
                            <button onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                    <div id="uploadContainer" class="upload-container">
                        <div id="dropZone" class="drop-zone" ondrop="handleDrop(event)" ondragover="allowDrag(event)">
                            Drag & Drop your file here (CSV, TXT, PDF)
                        </div>
                        <input type="file" id="fileInput" onchange="uploadFile()" accept=".csv,.txt,.pdf" hidden>
                        <button onclick="document.getElementById('fileInput').click()">Browse</button>
                    </div>
                </div>
            </div>
            <div id="memoryPanel" class="memory-panel is-collapsed">
                <div id="memoryCollapsedRail" class="memory-collapsed-rail" title="Expand knowledge graph panel">
                    <span id="memoryStatusIcon" class="memory-rail-icon">🧠</span>
                    <span id="memoryNodesCount" class="memory-rail-count">0</span>
                    <span class="memory-rail-menu">☰</span>
                </div>
                <div class="memory-open-content">
                    <div class="memory-header">
                        <span id="memoryCounter">Knowledge Graph</span>
                        <div class="memory-header-actions">
                            <button id="memoryFocusButton" class="memory-focus-button" type="button" aria-pressed="false" title="Expand graph panel">⤢</button>
                            <button id="memoryToggleButton" class="memory-toggle-button" type="button" aria-expanded="false" title="Expand knowledge graph panel">◀</button>
                        </div>
                    </div>
                    <div id="memoryGraphCanvas" class="memory-graph-canvas"></div>
                    <div id="memoryGraphLegend" class="memory-graph-legend"></div>
                </div>
                <div id="memoryResizeHandle" class="memory-resize-handle" title="Resize knowledge graph panel" aria-hidden="true"></div>
            </div>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Uploading file, please wait...</p>
    </div>
    
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="script.js?v=20260605-4"></script>
</body>
</html>

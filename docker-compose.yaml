services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: llm_data
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d llm_data"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mcp-server:
    build:
      context: .
      dockerfile: ./mcp-server/Dockerfile
    environment:
      MCP_HTTP_PORT: 8090
      MCP_FS_ROOT: /workspace/uploads
      MCP_MEMORY_ENABLED: ${MCP_MEMORY_ENABLED:-true}
      MCP_MEMORY_FILE_PATH: /workspace/memory/memory.json
    ports:
      - "8090:8090"
    volumes:
      - ./uploads:/workspace/uploads
      - ./mcp-memory:/workspace/memory
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8090/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: admin
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: llm_data
      UPLOAD_FOLDER: /app/uploads
      HF_API_TOKEN: ${HF_API_TOKEN}
      HF_MODEL_ID: ${HF_MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
      HF_PROVIDER: ${HF_PROVIDER:-auto}
      HF_TIMEOUT: ${HF_TIMEOUT:-60}
      MCP_SERVER_ENABLED: ${MCP_SERVER_ENABLED:-true}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp-server:8090}
      MCP_TIMEOUT: ${MCP_TIMEOUT:-10}
      MCP_MEMORY_ENABLED: ${MCP_MEMORY_ENABLED:-true}
      MEMORY_TOP_K: ${MEMORY_TOP_K:-5}
      MEMORY_MAX_OBSERVATIONS: ${MEMORY_MAX_OBSERVATIONS:-3}
      MAX_DOCUMENTS: ${MAX_DOCUMENTS:-3}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-10485760}
      MAX_TOTAL_SIZE_BYTES: ${MAX_TOTAL_SIZE_BYTES:-31457280}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES:-150}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-4}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-all-MiniLM-L6-v2}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data:

version: '3.9'

services:
  postgres:
    build:
      context: .
      dockerfile: ./database/Dockerfile
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: llm_data
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
      - "5001:5001"
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d llm_data"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  search:
    build:
      context: .
      dockerfile: ./search/Dockerfile
    volumes:
      - ./search:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: admin
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: llm_data
    ports:
      - "5000:5000"

  chatllm:
    build:
      context: ./
      dockerfile: ./chat/Dockerfile
    depends_on:
      - search
    ports:
      - "8081:8081"
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN}

  webapp:
    build:
      context: ./webapp
      dockerfile: ./Dockerfile
    depends_on:
      - chatllm
    ports:
      - "8080:80"
    environment:
      API_URL: "http://chatllm:8081"

volumes:
  postgres_data:
